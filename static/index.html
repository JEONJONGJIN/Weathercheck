<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>한솔스테이 날씨 조회</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">HANSOL STAY</p>
        <h1>한솔스테이 날씨 조회</h1>
      </section>

      <section class="panel">
        <p class="fixed-label">한솔스테이 주소</p>
        <div class="fixed-address-row">
          <div class="fixed-address-card">
            <strong>경기 연천군 장남면 장백로278번길 4</strong>
          </div>
          <button id="refresh-button" type="button">지금 조회</button>
        </div>
        <div id="status" class="status">조회 버튼을 누르면 날씨 API 비교를 시작합니다.</div>
      </section>

      <section id="result" class="result hidden">
        <div class="location-card">
          <div>
            <p class="muted">조회 위치</p>
            <h2 id="location-name"></h2>
          </div>
          <dl class="coords">
            <div>
              <dt>위도</dt>
              <dd id="latitude"></dd>
            </div>
            <div>
              <dt>경도</dt>
              <dd id="longitude"></dd>
            </div>
          </dl>
        </div>

        <section class="metrics-grid">
          <article class="metric-card">
            <p class="metric-label">성공한 소스</p>
            <p id="metric-provider-count" class="metric-value"></p>
          </article>
          <article class="metric-card">
            <p class="metric-label">현재 기온 편차</p>
            <p id="metric-current-spread" class="metric-value"></p>
          </article>
          <article class="metric-card">
            <p class="metric-label">6시간 강수 확률 편차</p>
            <p id="metric-precip-spread" class="metric-value"></p>
          </article>
        </section>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Provider</th>
                <th>현재 기온</th>
                <th>체감</th>
                <th>상태</th>
                <th>풍속</th>
                <th>강수량</th>
                <th>6시간 강수 확률</th>
                <th>24시간 최저</th>
                <th>24시간 최고</th>
                <th>기준 시각</th>
              </tr>
            </thead>
            <tbody id="forecast-table"></tbody>
          </table>
        </div>

        <section class="timeline-panel">
          <div class="section-head">
            <div>
              <p class="muted">24시간 타임라인</p>
              <h3>3시간 간격 예보 비교</h3>
            </div>
            <p class="section-note">각 셀은 기온과 강수확률을 같이 보여줍니다.</p>
          </div>
          <div class="table-wrap">
            <table>
              <thead id="timeline-head"></thead>
              <tbody id="timeline-body"></tbody>
            </table>
          </div>
        </section>

        <section class="mid-forecast-layout">
          <section id="mid-forecast-panel" class="mid-forecast-panel hidden">
            <div class="section-head">
              <div>
                <p class="muted">기상청 중기예보</p>
                <h3>3일에서 10일 전망</h3>
              </div>
              <p id="mid-forecast-time" class="section-note"></p>
            </div>
            <div id="mid-forecast-grid" class="mid-forecast-grid"></div>
          </section>

          <section id="accu-mid-forecast-panel" class="mid-forecast-panel hidden">
            <div class="section-head">
              <div>
                <p class="muted">AccuWeather 중기예보</p>
                <h3>5일 전망</h3>
              </div>
              <p id="accu-mid-forecast-time" class="section-note"></p>
            </div>
            <div id="accu-mid-forecast-grid" class="mid-forecast-grid"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
